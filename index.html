<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pujanggaku - Arsip 4 Tahun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --leather-red: linear-gradient(135deg, #7b2c2c, #4a1515);
            --leather-gold: linear-gradient(135deg, #c5a059, #8b6d1b);
            --leather-green: linear-gradient(135deg, #1a4a1a, #0d2b0d);
            --leather-blue: linear-gradient(135deg, #1a2a4a, #0d152b);
            --paper-old: #e8dcc4;
            --desk: #1a120b;
        }

        body {
            background-color: var(--desk);
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
            position: relative; color: #333;
        }

        /* Cahaya Jendela */
        .light-ray {
            position: absolute; top: -10%; left: -10%; width: 150vw; height: 150vh;
            background: linear-gradient(135deg, rgba(255,245,200,0.1) 0%, rgba(255,245,200,0) 50%);
            pointer-events: none; z-index: 10;
        }

        /* Menu Buku */
        .book-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; z-index: 20; }
        
        .book-cover {
            width: 180px; height: 260px; border-radius: 5px 15px 15px 5px;
            position: relative; cursor: pointer; transition: 0.4s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 15px; border-left: 6px solid rgba(0,0,0,0.3);
            box-shadow: 10px 15px 25px rgba(0,0,0,0.5);
        }
        .book-cover:hover { transform: translateY(-10px) rotate(2deg); }
        .locked { filter: grayscale(1) brightness(0.5); cursor: not-allowed; opacity: 0.7; }

        .book-1 { background: var(--leather-red); color: #f4e4bc; }
        .book-2 { background: var(--leather-blue); color: #e0e7ff; }
        .book-3 { background: var(--leather-green); color: #dcfce7; }
        .book-4 { background: var(--leather-gold); color: #3e2723; }

        /* UI Buku Terbuka */
        .open-book {
            width: 95%; max-width: 900px; height: 550px; background: var(--paper-old);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            display: flex; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border-radius: 5px;
            position: relative; z-index: 30;
        }
        .page { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .spine { width: 30px; background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.3), rgba(0,0,0,0.1)); }

        /* Tombol */
        .btn-magic {
            border: 1px solid #8b6d1b; padding: 10px; margin-top: 8px;
            font-family: 'Cinzel'; font-size: 12px; transition: 0.3s;
        }
        .btn-magic:hover { background: #8b6d1b; color: white; }

        .hidden { display: none !important; }
        .font-magic { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

    <div class="light-ray"></div>

    <!-- MENU UTAMA -->
    <div id="menu-ui" class="flex flex-col items-center">
        <h1 class="font-magic text-stone-200 text-4xl mb-12 tracking-[0.3em]">Arsip Pujangga</h1>
        <div class="book-grid">
            <div class="book-cover book-1" onclick="startLevel(1)">
                <h3 class="font-magic text-lg">Tahun I</h3>
                <p class="text-[10px] italic mt-2">Sang Pemula</p>
            </div>
            <div id="book-2" class="book-cover book-2 locked" onclick="startLevel(2)">
                <h3 class="font-magic text-lg">Tahun II</h3>
                <p class="text-[10px] italic mt-2">Pencari Makna</p>
            </div>
            <div id="book-3" class="book-cover book-3 locked" onclick="startLevel(3)">
                <h3 class="font-magic text-lg">Tahun III</h3>
                <p class="text-[10px] italic mt-2">Penjaga Tinta</p>
            </div>
            <div id="book-4" class="book-cover book-4 locked" onclick="startLevel(4)">
                <h3 class="font-magic text-lg">Tahun IV</h3>
                <p class="text-[10px] italic mt-2">Sang Maestro</p>
            </div>
        </div>
    </div>

    <!-- GAMEPLAY UI -->
    <div id="game-ui" class="hidden open-book">
        <div class="page border-right">
            <button onclick="exitGame()" class="text-[10px] font-magic mb-8 text-stone-500">« Tutup Buku</button>
            <div class="bg-white p-4 shadow-md rotate-[-2deg] mb-6">
                <div class="w-full h-32 bg-stone-200 flex items-center justify-center text-4xl">🖋️</div>
                <p id="author-name" class="text-center font-magic text-[10px] mt-2 font-bold"></p>
            </div>
            <div class="mt-auto font-magic text-[10px] flex justify-between text-amber-900">
                <span>SKOR: <span id="score">0</span></span>
                <span>TAHUN: <span id="level-num">1</span></span>
            </div>
        </div>
        <div class="spine"></div>
        <div id="content-page" class="page">
            <div class="flex justify-between text-[10px] font-magic text-stone-400 mb-6">
                <span>HALAMAN: <span id="page-num">1</span>/8</span>
                <span id="timer" class="text-red-800">30s</span>
            </div>
            <div id="quest-area">
                <p id="poem-text" class="italic text-center text-lg leading-relaxed mb-8 text-stone-800"></p>
                <div id="options" class="flex flex-col gap-2"></div>
            </div>
            <div id="result-area" class="hidden text-center">
                <h2 id="result-title" class="font-magic text-2xl mb-4"></h2>
                <p id="result-desc" class="text-sm italic mb-8"></p>
                <button onclick="nextStep()" class="btn-magic w-full">Lanjutkan</button>
            </div>
        </div>
    </div>

    <script>
        const database = {
            1: [
                { t: "Aku ingin mencintaimu dengan [sederhana]", p: "Sapardi Djoko Damono", k: "sederhana", o: ["sederhana", "hebat", "luar biasa"], e: "Kesederhanaan adalah inti dari puisi Sapardi ini." },
                { t: "Cintaku jauh di [pulau]", p: "Chairil Anwar", k: "pulau", o: ["pulau", "hati", "sana"], e: "Menggambarkan jarak yang tak terjangkau." },
                { t: "Tak ada yang lebih [tabah] dari hujan bulan Juni", p: "Sapardi", k: "tabah", o: ["tabah", "indah", "dingin"], e: "Ketabahan hujan menahan rindu." },
                { t: "Mampir ke [masa] lalu sebentar saja", p: "Aan Mansyur", k: "masa", o: ["masa", "rumah", "kenangan"], e: "Kenangan seringkali jadi tempat singgah." },
                { t: "Hujan itu seperti [rindu]", p: "Adimas Immanuel", k: "rindu", o: ["rindu", "pilu", "doa"], e: "Rindu jatuh berkali-kali seperti hujan." },
                { t: "Sebab [perpisahan] adalah cara mencintai", p: "Theoresia", k: "perpisahan", o: ["perpisahan", "pertemuan", "jarak"], e: "Mencintai dalam sunyi." },
                { t: "Rumah adalah [tempat] pulang", p: "M. Aan Mansyur", k: "tempat", o: ["tempat", "tujuan", "alasan"], e: "Kembali ke pelukan yang nyaman." },
                { t: "Dukamu adalah [dukaku]", p: "WS Rendra", k: "dukaku", o: ["dukaku", "lukaku", "matiku"], e: "Empati yang mendalam antar manusia." }
            ],
            2: [
                { t: "Kau adalah [buku] yang belum selesai kubaca", p: "Anonim", k: "buku", o: ["buku", "mimpi", "jalan"], e: "Seseorang yang penuh misteri." },
                { t: "Senja di pelabuhan [kecil]", p: "Chairil Anwar", k: "kecil", o: ["kecil", "indah", "sepi"], e: "Kesunyian di dermaga." },
                { t: "Menulis adalah [bekerja] untuk keabadian", p: "Pramoedya", k: "bekerja", o: ["bekerja", "berdoa", "berlari"], e: "Karya tulis akan hidup selamanya." },
                { t: "Aku ini [binatang] jalang", p: "Chairil Anwar", k: "binatang", o: ["binatang", "manusia", "jiwa"], e: "Metafora kebebasan dan pemberontakan." },
                { t: "Hanya [kata] yang tak bisa mati", p: "Subagio S.", k: "kata", o: ["kata", "cinta", "raga"], e: "Kekuatan sebuah tulisan." },
                { t: "Di beranda ini [angin] bertiup pelan", p: "Goenawan Mohamad", k: "angin", o: ["angin", "waktu", "rindu"], e: "Suasana hening di sore hari." },
                { t: "Selamat [pagi] luka", p: "Joko Pinurbo", k: "pagi", o: ["pagi", "datang", "malam"], e: "Gaya satir menyapa kesedihan." },
                { t: "Kita adalah dua [asing] yang saling tahu", p: "Wira Nagara", k: "asing", o: ["asing", "kekasih", "bayangan"], e: "Hubungan yang telah usai." }
            ],
            3: [
                { t: "Tinta ini [kering] sebelum sempat kutulis namamu", p: "Sastrawan", k: "kering", o: ["kering", "habis", "tumpah"], e: "Kesempatan yang hilang." },
                { t: "Jarak itu [jahat], tapi rindu itu hebat", p: "Penyair", k: "jahat", o: ["jahat", "indah", "nyata"], e: "Sisi gelap dari kerinduan." },
                { t: "Mencintaimu adalah [ibadah] paling rahasia", p: "Theoresia", k: "ibadah", o: ["ibadah", "dosa", "rahasia"], e: "Cinta yang sakral." },
                { t: "Sajak adalah [jendela] dunia", p: "Anon", k: "jendela", o: ["jendela", "pintu", "kunci"], e: "Melihat dunia lewat kata." },
                { t: "Malam adalah [ibu] bagi para pemimpi", p: "Joko Pinurbo", k: "ibu", o: ["ibu", "rumah", "makam"], e: "Ketentraman di malam hari." },
                { t: "Sepasang [mata] yang menyimpan badai", p: "Adimas", k: "mata", o: ["mata", "tangan", "kata"], e: "Emosi yang terpendam." },
                { t: "Kita hanya [debu] di semesta", p: "Anon", k: "debu", o: ["debu", "bintang", "angin"], e: "Kecilnya manusia." },
                { t: "Luka ini [indah] karena kau pelakunya", p: "Wira", k: "indah", o: ["indah", "perih", "lama"], e: "Penerimaan akan patah hati." }
            ],
            4: [
                { t: "Maestro sejati adalah [waktu]", p: "Filosof", k: "waktu", o: ["waktu", "cinta", "seni"], e: "Waktu yang menyempurnakan segala hal." },
                { t: "Hidup hanya [menunda] kekalahan", p: "Chairil Anwar", k: "menunda", o: ["menunda", "mencari", "melawan"], e: "Pandangan eksistensialisme Chairil." },
                { t: "Mati muda adalah [berkah]", p: "Soe Hok Gie", k: "berkah", o: ["berkah", "takdir", "pilihan"], e: "Semangat muda yang abadi." },
                { t: "Sajakku adalah [senjataku]", p: "Wiji Thukul", k: "senjataku", o: ["senjataku", "suaraku", "hidupku"], e: "Seni sebagai alat perlawanan." },
                { t: "Tuhan adalah [penyair] paling agung", p: "Sufi", k: "penyair", o: ["penyair", "pelukis", "raja"], e: "Keindahan alam semesta adalah puisi-Nya." },
                { t: "Kebebasan adalah [nafas] jiwa", p: "Rendra", k: "nafas", o: ["nafas", "tujuan", "harga"], e: "Pentingnya merdeka dalam berpikir." },
                { t: "Puisi tidak pernah [berbohong]", p: "Anon", k: "berbohong", o: ["berbohong", "menangis", "berhenti"], e: "Kejujuran dalam berkarya." },
                { t: "Akhirnya kita hanya [nama] di batu nisan", p: "Anon", k: "nama", o: ["nama", "angka", "cerita"], e: "Fana-nya kehidupan manusia." }
            ]
        };

        let currentLevel = 1;
        let currentIndex = 0;
        let score = 0;
        let timer;
        let unlockedLevels = [1];

        function startLevel(lvl) {
            if (!unlockedLevels.includes(lvl)) return alert("Selesaikan tahun sebelumnya untuk membuka segel ini!");
            currentLevel = lvl;
            currentIndex = 0;
            score = 0;
            document.getElementById('menu-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            loadQuest();
        }

        function loadQuest() {
            const data = database[currentLevel][currentIndex];
            document.getElementById('level-num').innerText = currentLevel;
            document.getElementById('score').innerText = score;
            document.getElementById('page-num').innerText = currentIndex + 1;
            document.getElementById('author-name').innerText = data.p;
            document.getElementById('poem-text').innerText = data.t.replace(`[${data.k}]`, "_______");
            
            document.getElementById('quest-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');

            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            data.o.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-magic";
                btn.innerText = opt;
                btn.onclick = () => check(opt, data.k);
                optDiv.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            let left = 30;
            document.getElementById('timer').innerText = left + "s";
            clearInterval(timer);
            timer = setInterval(() => {
                left--;
                document.getElementById('timer').innerText = left + "s";
                if(left <= 0) check(null, database[currentLevel][currentIndex].k);
            }, 1000);
        }

        function check(ans, correct) {
            clearInterval(timer);
            const isCorrect = ans === correct;
            if(isCorrect) score += 100;

            document.getElementById('quest-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            
            const title = document.getElementById('result-title');
            title.innerText = isCorrect ? "Tinta Sempurna!" : "Tinta Pudar...";
            title.className = `font-magic text-2xl mb-4 ${isCorrect ? 'text-green-800' : 'text-red-900'}`;
            document.getElementById('result-desc').innerText = database[currentLevel][currentIndex].e;
        }

        function nextStep() {
            currentIndex++;
            if (currentIndex < 8) {
                loadQuest();
            } else {
                finishLevel();
            }
        }

        function finishLevel() {
            alert(`Tahun ${currentLevel} Selesai! Skor: ${score}`);
            if (currentLevel < 4) {
                unlockedLevels.push(currentLevel + 1);
                document.getElementById(`book-${currentLevel + 1}`).classList.remove('locked');
            }
            exitGame();
        }

        function exitGame() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('menu-ui').classList.remove('hidden');
            clearInterval(timer);
        }
    </script>
</body>
</html>
